<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Absensi QR Kelas 4A</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
  font-family: Arial, sans-serif;
  text-align:center;
  background:#f2f2f2;
  margin:0;
  padding:20px;
}


h2{
  color:#333;
}


#reader{

  width:320px;
  margin:auto;
  display:none;
  background:white;

}


#hasil{

  margin:20px;
  font-size:18px;
  font-weight:bold;

}



button{

  width:260px;
  padding:15px;
  margin:10px;

  border:none;
  border-radius:10px;

  font-size:18px;

}



#btnScan{

  background:#198754;
  color:white;

}


#btnLanjut{

  background:#0d6efd;
  color:white;
  display:none;

}


</style>

</head>


<body>


<h2>
ABSENSI QR SISWA 4A
</h2>


<div id="reader"></div>


<div id="hasil">
Silakan tekan tombol scan
</div>



<button id="btnScan" onclick="mulaiScan()">
📷 MULAI SCAN
</button>


<button id="btnLanjut" onclick="scanLanjut()">
🔄 SCAN SELANJUTNYA
</button>



<script>


//=====================================
// GANTI DENGAN URL WEB APP ANDA
//=====================================


const API = 
"https://script.google.com/macros/s/AKfycbzJKEey4BfQGgd2SvbH7HT72kFZalnElX5NVi2s0eWFSagE1NSPbGC4n2vrDd7qdhEp/exec";



let scanner;



//=====================================
// MULAI SCAN
//=====================================


function mulaiScan(){


document.getElementById("reader").style.display="block";


document.getElementById("btnScan").style.display="none";


document.getElementById("btnLanjut").style.display="none";


document.getElementById("hasil").innerHTML =
"Arahkan kamera ke QR...";



scanner = new Html5Qrcode("reader");



scanner.start(

{
 facingMode:"environment"
},


{
 fps:10,
 qrbox:250
},


function(qrCodeMessage){


  scanner.stop()
  .then(()=>{


    document.getElementById("reader").style.display="none";


    kirimAbsen(qrCodeMessage);


  });



},


function(error){

}



).catch(function(err){


document.getElementById("hasil").innerHTML =
"Kamera tidak dapat dibuka";


});



}




//=====================================
// KIRIM KE GOOGLE SCRIPT
//=====================================


function kirimAbsen(id){



document.getElementById("hasil").innerHTML =
"Memproses...";



fetch(

API+
"?action=scan&id="+id

)


.then(response=>response.json())


.then(data=>{


if(data.success){


document.getElementById("hasil").innerHTML =

"✅ ABSENSI BERHASIL<br><br>"+
"Nama : "+data.nama+
"<br>Kelas : "+data.kelas;



}else{


document.getElementById("hasil").innerHTML =

"❌ "+data.message;


}



document.getElementById("btnLanjut").style.display="inline-block";



})


.catch(function(){


document.getElementById("hasil").innerHTML =
"❌ Server tidak terhubung";


});


}




//=====================================
// SCAN SISWA BERIKUTNYA
//=====================================


function scanLanjut(){


mulaiScan();


}


</script>


</body>
</html>
