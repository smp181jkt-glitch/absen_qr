<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Absensi QR Kelas 4A</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
  font-family:Arial;
  text-align:center;
  background:#f1f1f1;
}

h2{
  color:#333;
}

#reader{
  width:320px;
  margin:auto;
  background:white;
  display:none;
}


button{

  width:250px;
  padding:15px;
  margin:10px;
  border:none;
  border-radius:8px;
  font-size:18px;
  cursor:pointer;

}


#mulai{
  background:#198754;
  color:white;
}


#ulang{
  background:#0d6efd;
  color:white;
  display:none;
}


#hasil{

  margin:20px;
  font-size:18px;
  font-weight:bold;

}

</style>

</head>


<body>


<h2>
ABSENSI QR SISWA 4A
</h2>


<div id="reader"></div>


<div id="hasil">
Tekan tombol scan
</div>



<button id="mulai" onclick="mulaiScan()">
📷 MULAI SCAN
</button>


<button id="ulang" onclick="scanLagi()">
🔄 SCAN SELANJUTNYA
</button>



<script>


//================================
// URL WEB APP ANDA
//================================

const API =
"https://script.google.com/macros/s/AKfycbwwuR1XOimFnX0K2eM2OTgobhoVSo7d5SxeOMp41uXR24p4c5mCPZ4S51Y-2707t6lhZw/exec";



let scanner = null;



//================================
// MULAI SCAN
//================================


function mulaiScan(){


document.getElementById("reader").style.display="block";

document.getElementById("mulai").style.display="none";

document.getElementById("ulang").style.display="none";


document.getElementById("hasil").innerHTML =
"Silakan arahkan QR...";



scanner = new Html5Qrcode("reader");



scanner.start(

{facingMode:"environment"},


{

fps:10,

qrbox:250

},


qr=>{


scanner.stop();


document.getElementById("reader").style.display="none";


kirimAbsen(qr);



},


error=>{}



);


}




//================================
// KIRIM KE SERVER
//================================


function kirimAbsen(id){


document.getElementById("hasil").innerHTML =
"Memproses...";



fetch(

API+
"?action=scan&id="+id

)


.then(res=>res.json())


.then(data=>{


if(data.success){


document.getElementById("hasil").innerHTML =

"✅ ABSEN BERHASIL<br><br>"+
data.nama+
"<br>Kelas "+data.kelas;


}else{


document.getElementById("hasil").innerHTML =

"❌ "+data.message;


}



document.getElementById("ulang").style.display="inline-block";


})


.catch(()=>{


document.getElementById("hasil").innerHTML =
"❌ Server tidak terhubung";


});



}




//================================
// SCAN BERIKUTNYA
//================================


function scanLagi(){


mulaiScan();


}



</script>


</body>
</html>
