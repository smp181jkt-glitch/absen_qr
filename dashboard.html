<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Guru</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<div class="card">

<h1>📚 Dashboard Absensi Guru</h1>

<p>Kelas 4A</p>

</div>

<div class="grid">

<div class="stat">
<h2 id="totalSiswa">0</h2>
<p>Total Siswa</p>
</div>

<div class="stat">
<h2 id="hadir">0</h2>
<p>Hadir</p>
</div>

<div class="stat">
<h2 id="izin">0</h2>
<p>Izin</p>
</div>

<div class="stat">
<h2 id="sakit">0</h2>
<p>Sakit</p>
</div>

<div class="stat">
<h2 id="belum">0</h2>
<p>Belum Absen</p>
</div>

</div>

<div class="card">
  
<label>
📅 Pilih Tanggal
</label>

<input 
type="date"
id="tanggal">

<input
type="text"
id="cari"
placeholder="Cari Nama Siswa...">

<button
class="btn-primary"
onclick="loadData()">

🔄 Refresh

</button>

</div>

<div class="card">

<table>

<thead>

<tr>

<th>ID</th>

<th>Nama</th>

<th>Kelas</th>

<th>Status</th>

<th>Aksi</th>

</tr>

</thead>

<tbody id="tbody">

</tbody>

</table>

</div>

</div>

<script src="dashboard.js"></script>

</body>

</html>
