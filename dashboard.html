<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Absensi Guru</title>


<style>

body{

font-family:Arial;
background:#f2f2f2;
padding:20px;

}


h2{

text-align:center;

}


.box{

background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;

}


button{

padding:12px 20px;
font-size:16px;
border:none;
border-radius:8px;
background:#0d6efd;
color:white;

}


table{

width:100%;
border-collapse:collapse;
background:white;
margin-top:15px;

}


th{

background:#198754;
color:white;

}


td,th{

border:1px solid #ddd;
padding:8px;
text-align:center;

}


.belum{

color:red;
font-weight:bold;

}


.hadir{

color:green;
font-weight:bold;

}


</style>

</head>


<body>


<h2>
Dashboard Absensi Kelas 4A
</h2>



<div class="box">

<button onclick="loadData()">
🔄 Refresh Data
</button>


<h3 id="ringkasan">
Memuat...
</h3>


</div>




<table>


<thead>

<tr>

<th>ID</th>

<th>Nama</th>

<th>Kelas</th>

<th>Status</th>


</tr>


</thead>


<tbody id="tabel">

</tbody>


</table>





<script>


//================================
// GANTI DENGAN URL WEB APP ANDA
//================================


const API =

"https://script.google.com/macros/s/AKfycbw0HOvYgD74Kcqs_21E0EgrtShk-dDdpNEONarLCoYGPyWY4VdgO-OjRP4oUAKyptSLsw/exec";




//================================
// AMBIL DATA
//================================


function loadData(){



fetch(
API+"?action=dashboard"
)


.then(response=>response.json())


.then(data=>{


let isi="";

let hadir=0;



data.forEach(siswa=>{


if(siswa.status=="HADIR"){

hadir++;

}



let warna =
siswa.status=="HADIR"
?
"hadir"
:
"belum";



isi += `


<tr>

<td>${siswa.id}</td>

<td>${siswa.nama}</td>

<td>${siswa.kelas}</td>

<td class="${warna}">
${siswa.status}
</td>


</tr>


`;



});



document.getElementById("tabel").innerHTML=isi;



document.getElementById("ringkasan").innerHTML=

"Hadir : "
+hadir+
" | Belum Absen : "
+(data.length-hadir);



});


}



loadData();


</script>


</body>

</html>
